<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Orçamento</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inria+Sans:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Orbitron:wght@400..900&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/detalhes-orcamento.css">
</head>
<body>
      <header>
        <button class="back-button" type="button" onclick="window.history.back()">← Voltar</button>

        <h1>Orçamento</h1>

      <a href="perfil-usuario.html" class="profile-link">
            <img src="" alt="Foto de perfil" id="profile-photo">
        </a>
    </header>

    <main>
        <div class="budget">
            <h2>Nome da empresa</h2>

            <!-- User Info - Moved to the beginning -->
            <div class="user-info">
                <img src="" alt="Foto de perfil do usuario" class="user-avatar">
                <div class="user-details">
                    <h3>Nome do usuario</h3>
                    <span>Carro-Modelo</span>
                    <span>Chassi</span>
                </div>
            </div>

            <div class="table">
                <div class="table-header">
                    <span>Quantidade</span>
                    <span>Serviço</span>
                    <span>Preço</span>
                </div>
                <div class="table-row">
                    <span>1</span>
                    <span>Troca de óleo</span>
                    <span>R$ 150,00</span>
                </div>
                <div class="table-row">
                    <span>1</span>
                    <span>Alinhamento</span>
                    <span>R$ 80,00</span>
                </div>
                <div class="table-row">
                    <span>1</span>
                    <span>Balanceamento</span>
                    <span>R$ 60,00</span>
                </div>
                
            </div>

            <span>Os serviços so seram realiazados apos a confirmação</span>
            
            <div class="btns">
                <button class="btn" type="button">Aceitar</button>
                <button class="btn" type="button">Recusar</button>
            </div>

            <span>O pagamento devera ser feito presencialemente com a loja</span>

        </div>
    </main>
</body>
</html>
