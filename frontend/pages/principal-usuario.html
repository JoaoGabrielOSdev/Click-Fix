<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina Principal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inria+Sans:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Orbitron:wght@400..900&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/reset.css">
    <link rel="stylesheet" href="../styles/principal-usuario.css">

</head>
<body>
    <header>
        <div class="container">
            <button class="mobile-nav" aria-label="Menu de navegação">
                <div></div>
                <div></div>
                <div></div>
            </button>

            <div class="search-bar">
                <img src="../assets/images/search-svgrepo-com.svg" alt="">
                <input type="text" placeholder="Pesquisar">
            </div>
            <a class="profile-photo" href="/perfil/usuario">
                <img src="" alt="Foto de perfil do usuário" id="profile-photo">
            </a>
        </div>
    </header>

    <aside class="sidebar" id="sidebar">
        <nav class="sidebar-menu">

            <a class="profile-photo" href="/perfil/usuario">
                <img src="" alt="Foto de perfil do usuário" id="profile-photo">
            </a>

            <h2>Nome do Usuário</h2>

            <span>Modelo do carro</span>
            <a href="agendamento-usuario.html" class="sidebar-item">
                Histórico de Agendamento
            </a>
            <a href="meus-carros.html" class="sidebar-item">
                Meus Carros
            </a>
            <a href="orcamento.html" class="sidebar-item">
                Orçamento
            </a>
            <a href="configuracoes.html" class="sidebar-item">
                Configurações
            </a>
            <a href="politica-de-privacidade.html" class="sidebar-item">
                Política de Privacidade
            </a>
            <a href="termos-de-uso.html" class="sidebar-item">
                Termos de Uso
            </a>
        </nav>
    </aside>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main>
        <div id="company-feed-list" class="company-feed-list">
            <a href="pagina_da_loja_para_usuario.html" class="feed" id="company-feed-template" style="display:none;">

            <div class="feed-hearder">
                <!---Foto de perfil da Empresa-->
                <figure>
                    <img src="" alt="Foto de perfil da empresa">
                </figure>

                <!--Nome da Empresa-->
                <h2>Nome da Empresa</h2>

                <!---Avaliação da Empresa-->
                <div class="rating">
                    <span>4,5</span>
                    <img src="../assets/images/Star.svg" alt="Icone de estrela para avaliação">
                </div>
                
            </div>

            <div class="feed-content">
                <div class="feed-imagem">
                    <img src="" alt="Fotos da Loja">
                    <img src="" alt="Fotos da Loja">
                    <img src= "" alt="Fotos da Loja">
                    <img src="" alt="Fotos da Loja">
                    <img src="" alt="Fotos da Loja">
                </div>
                <h3>Localização </h3>
            </div>

            </a>
        </div>

        <div id="no-company-message" class="no-company-message" style="display:none;">Não há Empresas Registradas perto de você</div>
    </main>
    

    
    <script>
        // Mostra/oculta feed conforme empresas cadastradas do usuário
        (async function initCompanyFeed() {
            const list = document.getElementById('company-feed-list');
            const template = document.getElementById('company-feed-template');
            const msg = document.getElementById('no-company-message');

            if (!list || !template || !msg) return;

            // Login atual é simulado (backend não usa sessão/token). Para compatibilidade,
            // consideramos o usuário logado como id_usuario = 1.
            const userId = 1;

            try {
                // endpoint novo: retorna as empresas do usuário (com dados pro feed)
                const res = await fetch(`/api/empresa/empresasUsuario/${userId}`);
                const data = await res.json();
                const empresas = (data && data.empresas) ? data.empresas : [];

                // remove clones (mantém template)
                list.querySelectorAll('.feed').forEach(el => {
                    if (el.id !== 'company-feed-template') el.remove();
                });

                if (!empresas.length) {
                    template.style.display = 'none';
                    list.classList.add('hidden');
                    msg.style.display = 'block';
                    return;
                }

                list.classList.remove('hidden');
                msg.style.display = 'none';
                template.style.display = 'none';

                empresas.forEach((empresa) => {
                    const clone = template.cloneNode(true);
                    clone.removeAttribute('id');
                    clone.style.display = 'flex';

                    // Nome
                    const nameEl = clone.querySelector('.feed-hearder h2');
                    if (nameEl) nameEl.textContent = empresa.nome_fantasia || empresa.nome || 'Nome da Empresa';

                    // Foto (se existir)
                    const headerImg = clone.querySelector('.feed-hearder figure img');
                    if (headerImg) {
                        headerImg.src = empresa.foto_perfil || empresa.foto_perfil_url || '';
                    }

                    // Imagens do corpo (placeholder se não tiver)
                    const bodyImgs = clone.querySelectorAll('.feed-imagem img');
                    if (bodyImgs && bodyImgs.length) {
                        // usa foto1..foto5 se vier do backend; senão mantém vazio
                        const fotos = [empresa.foto_1, empresa.foto_2, empresa.foto_3, empresa.foto_4, empresa.foto_5].filter(Boolean);
                        bodyImgs.forEach((img, idx) => {
                            img.src = fotos[idx] || '';
                        });
                    }

                    // Localização
                    const localEl = clone.querySelector('.feed-content h3');
                    if (localEl) localEl.textContent = empresa.localizacao || empresa.endereco || 'Localização';

                    list.appendChild(clone);
                });
            } catch (e) {
                    template.style.display = 'none';
                    list.classList.add('hidden');
                    msg.style.display = 'block';
                }
        })();

        const mobileNavBtn = document.querySelector('.mobile-nav');

        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');

        function toggleSidebar() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        mobileNavBtn.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);

        document.querySelectorAll('.sidebar-item').forEach(item => {
            item.addEventListener('click', toggleSidebar);
        });
    </script>
</body>
</html>
