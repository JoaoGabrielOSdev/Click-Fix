<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registre-se</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inria+Sans:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Orbitron:wght@400..900&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/reset.css">
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
    <main>
        <button class="back-button" type="button" onclick="window.history.back()">← Voltar</button>
        <div class="container container-register">
            <h1>Registre-se</h1>
            <form id="companyRegisterForm" action="#" method="post" class="register">
                    <!-- Nome -->
                    <div class="input-box">
                        <label for="nome">Nome:</label>
                        <input type="text" id="nome" name="nome" required placeholder="Digite seu nome">
                    </div>
                     
                     <!--Email-->
                    <div class="input-box">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required placeholder="Digite seu email">
                    </div>

                     <!--CNPJ-->
                    <div class="input-box">
                        <label for="cnpj">CNPJ:</label>
                        <input type="text" id="cnpj" name="cnpj" required placeholder="Digite seu CNPJ">
                    </div>

                     <!--Senha-->
                    <div class="input-box">
                        <label for="senha">Senha:</label>
                        <input type="password" id="senha" name="senha" required minlength="6" placeholder="Digite uma senha">
                    </div>
                    <!--Telefone-->
                    <div class="input-box">
                        <label for="telefone">Telefone:</label>
                        <input type="tel" id="telefone" name="telefone" required  placeholder="Digite o numero de telefone">
                    </div>

                    <!--Endereço-->
                    <div class="input-box">
                         <label for="endereco">Endereço:</label>
                        <input type="text" id="endereco" name="endereco" required placeholder="Digite seu Endereço">
                    </div>

                        <!--Termos-->
                    <div class="terms">
                        <input type="checkbox" required>
                        <span>Eu concordo com os Termos & Condições</span>
                    </div>
                    
                     <!--Botão-->
                    <button class="btn" type="submit" >Enviar</button>

                    <div class="login-certificate">
                        <p>Já possui uma conta? <a href="/login/empresa">Entre</a></p>
                    </div>
                    
            </form>
        </div>
    </main>

    <script>
        // Função para formatar CNPJ
        function formatCNPJ(value) {
            value = value.replace(/\D/g, '');
            if (value.length > 14) value = value.slice(0, 14);
            if (value.length <= 2) return value;
            if (value.length <= 5) return value.slice(0, 2) + '.' + value.slice(2);
            if (value.length <= 8) return value.slice(0, 2) + '.' + value.slice(2, 5) + '.' + value.slice(5);
            if (value.length <= 12) return value.slice(0, 2) + '.' + value.slice(2, 5) + '.' + value.slice(5, 8) + '/' + value.slice(8);
            return value.slice(0, 2) + '.' + value.slice(2, 5) + '.' + value.slice(5, 8) + '/' + value.slice(8, 12) + '-' + value.slice(12);
        }

        // Função para formatar Telefone
        function formatPhone(value) {
            value = value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            if (value.length <= 2) return value;
            if (value.length <= 7) return '(' + value.slice(0, 2) + ') ' + value.slice(2);
            return '(' + value.slice(0, 2) + ') ' + value.slice(2, 7) + '-' + value.slice(7);
        }

        // Aplicar máscara no input CNPJ
        const cnpjInput = document.getElementById('cnpj');
        if (cnpjInput) {
            cnpjInput.addEventListener('input', (e) => {
                e.target.value = formatCNPJ(e.target.value);
            });
        }

        // Aplicar máscara no input Telefone
        const telefoneInput = document.getElementById('telefone');
        if (telefoneInput) {
            telefoneInput.addEventListener('input', (e) => {
                e.target.value = formatPhone(e.target.value);
            });
        }

        const companyRegisterForm = document.getElementById('companyRegisterForm');

        if (companyRegisterForm) {
            companyRegisterForm.addEventListener('submit', async (event) => {
                event.preventDefault();

                const nomeEmpresa = document.getElementById('nome').value.trim();
                const email = document.getElementById('email').value.trim();
                const cnpj = document.getElementById('cnpj').value.replace(/\D/g, '');
                const senha = document.getElementById('senha').value;
                const telefone = document.getElementById('telefone').value.replace(/\D/g, '');
                const endereco = document.getElementById('endereco').value.trim();

                try {
                    const response = await fetch('/api/empresa/registro', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ nomeEmpresa, cnpj, email, senha, telefone, endereco })
                    });

                    const data = await response.json();

                    if (data.success) {
                        alert('Empresa registrada com sucesso!');
                        window.location.href = '/login/empresa';
                    } else {
                        alert(data.message || 'Erro ao registrar empresa.');
                    }
                } catch (error) {
                    console.error('Erro no registro da empresa:', error);
                    alert('Erro ao registrar empresa. Tente novamente.');
                }
            });
        }
    </script>
</body>
</html>
