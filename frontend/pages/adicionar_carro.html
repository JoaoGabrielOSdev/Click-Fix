<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicione um carro</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inria+Sans:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Orbitron:wght@400..900&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/adicionar_carro.css">
</head>
<body>
    <header>
        <button class="back-button" type="button" onclick="window.history.back()">← Voltar</button>

        <h3>Editar veiculo</h3>
    </header>
    <main>
         
        <figure>
            <img src="" alt="Foto do carro">
        </figure>
        
        <form action="" method="post" class="car-form">
            <label for="car-model">Modelo do Carro:</label>
            <input type="text" id="car-model" name="car-model" required>

            <label for="car-year">Ano do Carro:</label>
            <input type="number" id="car-year" name="car-year" maxlength="4" required>

            <label for="car-plate">Placa do Carro:</label>
            <input type="text" id="car-plate" name="car-plate" required>

            <label for="chassi">Chassi:</label>
            <input type="text" id="chassi" name="chassi" required>

            <button type="submit">Adicionar Carro</button>
        </form>

        <span>Esse dados serão salvos no sistema para identifcar o seu veículo</span>
</body>
</html>
