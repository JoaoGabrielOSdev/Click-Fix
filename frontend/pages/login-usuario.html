<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Usuário</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inria+Sans:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Orbitron:wght@400..900&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/reset.css">
    <link rel="stylesheet" href="/styles/style.css">
</head>
<body>
    <main>
        <div class="container">
            <div class="Logo">
                <figure>
                    <img src="/assets/images/logoCheckcar.png" alt="Logo Azul">
                </figure>
            </div>
            <h2 class="NomeEmpresa">CheckCar</h2>
            <h1 class="Boasvindas">Login do Usuário</h1>

            <form id="loginForm" class="login-form">
                <div class="input-box">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="Digite seu email">
                </div>

                <div class="input-box">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" name="senha" required placeholder="Digite sua senha">
                </div>

                <button type="submit" class="btn">Entrar</button>
            </form>

            <div class="links">
                <a href="#" class="link">Esqueceu a senha?</a>
                <a href="/registro/usuario" class="link">Não tem conta? Cadastre-se</a>
                <a href="/" class="link">← Voltar</a>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            try {
                const response = await fetch('/api/usuario/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, senha })
                });

                const data = await response.json();

                if (data.success) {
                    alert('Login realizado com sucesso!');
                    // Aqui você pode redirecionar para o dashboard do usuário
                    // window.location.href = '/dashboard/usuario';
                } else {
                    alert(data.message || 'Erro no login');
                }
            } catch (error) {
                console.error('Erro:', error);
                alert('Erro ao fazer login. Tente novamente.');
            }
        });
    </script>
</body>
</html>
