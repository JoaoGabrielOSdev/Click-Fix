<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registre-se</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inria+Sans:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Orbitron:wght@400..900&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/reset.css">
    <link rel="stylesheet" href="../styles/style.css">

</head>
<body>
    <main>
        <button class="back-button" type="button" onclick="window.history.back()">← Voltar</button>
        <div class="container ">
            <h1>Registre-se</h1>
            <form id="userRegisterForm" action="#" method="post" class="register">
                    <!-- Nome -->
                    <div class="input-box">
                        <label for="nome">Nome:</label>
                        <input type="text" id="nome" name="nome" required placeholder="Digite seu nome">
                    </div>
                     
                     <!--Email-->
                    <div class="input-box">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required placeholder="Digite seu email">
                    </div>

                     <!--CPF-->
                    <div class="input-box">
                        <label for="cpf">CPF:</label>
                        <input type="text" id="cpf" name="cpf" required placeholder="Digite seu CPF">
                    </div>

                     <!--Senha-->
                    <div class="input-box">
                        <label for="senha">Senha:</label>
                        <input type="password" id="senha" name="senha" required minlength="6" placeholder="Digite uma senha">
                    </div>

                    <!--Telefone-->
                    <div class="input-box">
                        <label for="telefone">Telefone:</label>
                        <input type="tel" id="telefone" name="telefone" required placeholder="Digite o numero de telefone">
                    </div>

                        <!--Termos-->
                    <div class="terms">
                        <input type="checkbox" required>
                        <span>Eu concordo com os Termos & Condições</span>
                    </div>


                     <!--Botão-->
                    <button class="btn" type="submit" >Enviar</button>

                    <div class="login-certificate">
                        <p>Já possui uma conta? <a href="/login/usuario">Entre</a></p>
                    </div>
                    
            </form>
        </div>
    </main>

    <script>
        // Função para formatar CPF
        function formatCPF(value) {
            value = value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            if (value.length <= 3) return value;
            if (value.length <= 6) return value.slice(0, 3) + '.' + value.slice(3);
            if (value.length <= 9) return value.slice(0, 3) + '.' + value.slice(3, 6) + '.' + value.slice(6);
            return value.slice(0, 3) + '.' + value.slice(3, 6) + '.' + value.slice(6, 9) + '-' + value.slice(9);
        }

        // Função para formatar telefone
        function formatTelefone(value) {
            value = value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            if (value.length <= 2) return '(' + value;
            if (value.length <= 6) return '(' + value.slice(0, 2) + ') ' + value.slice(2);
            if (value.length <= 10) return '(' + value.slice(0, 2) + ') ' + value.slice(2, 6) + '-' + value.slice(6);
            return '(' + value.slice(0, 2) + ') ' + value.slice(2, 7) + '-' + value.slice(7);
        }

        // Aplicar máscara no input CPF
        const cpfInput = document.getElementById('cpf');
        if (cpfInput) {
            cpfInput.addEventListener('input', (e) => {
                e.target.value = formatCPF(e.target.value);
            });
        }

        // Aplicar máscara no input telefone
        const telefoneInput = document.getElementById('telefone');
        if (telefoneInput) {
            telefoneInput.addEventListener('input', (e) => {
                e.target.value = formatTelefone(e.target.value);
            });
        }

        const userRegisterForm = document.getElementById('userRegisterForm');

        if (userRegisterForm) {
            userRegisterForm.addEventListener('submit', async (event) => {
                event.preventDefault();

                const nome = document.getElementById('nome').value.trim();
                const email = document.getElementById('email').value.trim();
                const cpf = document.getElementById('cpf').value.replace(/\D/g, '');
                const telefone = document.getElementById('telefone').value.replace(/\D/g, '');
                const senha = document.getElementById('senha').value;

                try {
                    const response = await fetch('/api/usuario/registro', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ nome, cpf, email, senha, telefone })
                    });

                    const data = await response.json();

                    if (data.success) {
                        alert('Registro realizado com sucesso!');
                        window.location.href = '/login/usuario';
                    } else {
                        alert(data.message || 'Erro ao registrar usuário.');
                    }
                } catch (error) {
                    console.error('Erro no registro de usuário:', error);
                    alert('Erro ao registrar usuário. Tente novamente.');
                }
            });
        }
    </script>
</body>
</html>
