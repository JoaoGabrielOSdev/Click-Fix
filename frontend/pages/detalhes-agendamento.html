<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do agendamento</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inria+Sans:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Orbitron:wght@400..900&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/detalhes-agendamento.css">
</head>
<body>

    <header>
        <a href="agendamento-usuario.html" class="back-button">← Voltar</a>
        <h1>Detalhes do Agendamento</h1>

        <a href="perfil-usuario.html" class="profile-link">
            <img src="" alt="Foto de perfil" id="profile-photo">
        </a>

    </header>

    <main>
        <div class="container">

            <img src="" alt="Foto da loja">
            <h2>Nome da Loja</h2>
            
            <div class="datetime-row">
                <div class="Date">
                    <p>01/01/2024</p>
                </div>
                <div class="Time">
                    <p>14:00</p>
                </div>
            </div>
            
            <p class="address">Endereço da Loja</p>
            <p class="status">Confirmado</p>

            <hr class="divider">

            <h3 class="section-title">Veículo</h3>
            
            <div class="car-info">
                <div class="car-info-item">
                    <span class="label">Modelo</span>
                    <span class="value">Toyota Corolla</span>
                </div>
                <div class="car-info-item">
                    <span class="label">Chassi</span>
                    <span class="value">ABC123456789</span>
                </div>
                <div class="car-info-item">
                    <span class="label">Placa</span>
                    <span class="value">ABC-1234</span>
                </div>
            </div>

            <button class="btn">Cancelar agendamento</button>

        </div>
    </main>
        
    
</body>
</html>
